services:
  # ============================================================
  # 景区边缘服务器部署 - 山地索道塔架监测平台
  # 所有服务均部署于边缘服务器，数据本地驻留，不下发云端
  # ============================================================

  # ------------------------------
  # NATS 消息总线 - 传感器/模块间通信
  # ------------------------------
  nats:
    image: nats:2.10-alpine
    container_name: cableway-nats
    restart: unless-stopped
    command:
      - "--js"
      - "--sd"
      - "/data/jetstream"
      - "-m"
      - "8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data/jetstream
      - ./deploy/nats/nats-server.conf:/etc/nats/nats-server.conf:ro
    healthcheck:
      test: ["CMD", "nats", "server", "check", "js", "--server", "nats://127.0.0.1:4222"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cableway-net

  # ------------------------------
  # ClickHouse - 时序数据海量存储
  # ------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: cableway-clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native TCP
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse/users.xml:/etc/clickhouse-server/users.xml:ro
      - ./deploy/clickhouse/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./deploy/clickhouse/init-schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
    environment:
      - CLICKHOUSE_DB=cableway_monitor
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/?query=SELECT%201"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - cableway-net

  # ------------------------------
  # Rust Axum 后端服务
  # ------------------------------
  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    container_name: cableway-backend
    restart: unless-stopped
    depends_on:
      nats:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      - CABLEWAY_HOST=0.0.0.0
      - CABLEWAY_PORT=3001
      - CABLEWAY_NATS_URL=nats://nats:4222
      - CABLEWAY_CLICKHOUSE_URL=http://default:@clickhouse:8123
      - CABLEWAY_SIMULATOR=true
      - RUST_LOG=info,cableway_monitor=debug,risk_engine=info,decision_engine=info
      - TZ=Asia/Shanghai
    ports:
      - "3001:3001"
    volumes:
      - backend-logs:/var/log/cableway
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cableway-net

  # ------------------------------
  # Qwik 前端 (静态 + SSR)
  # ------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/frontend.Dockerfile
    container_name: cableway-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - FRONTEND_PORT=80
      - BACKEND_URL=http://backend:3001
      - TZ=Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks:
      - cableway-net

  # ------------------------------
  # Prometheus 监控采集
  # ------------------------------
  prometheus:
    image: prom/prometheus:v2.51-linux-amd64
    container_name: cableway-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - cableway-net

  # ------------------------------
  # Grafana 运维监控大屏
  # ------------------------------
  grafana:
    image: grafana/grafana:10.4-ubuntu
    container_name: cableway-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana-admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    secrets:
      - grafana-admin
    depends_on:
      - prometheus
      - clickhouse
    networks:
      - cableway-net

  # ------------------------------
  # Portainer - 边缘容器可视化管理
  # ------------------------------
  portainer:
    image: portainer/portainer-ce:2.21-alpine
    container_name: cableway-portainer
    restart: unless-stopped
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    networks:
      - cableway-net

# ------------------------------
# 边缘服务器本地持久化卷
# ------------------------------
volumes:
  nats-data:
    driver: local
  clickhouse-data:
    driver: local
  backend-logs:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  portainer-data:
    driver: local

# ------------------------------
# 平台内网 - 模块间高速通信
# ------------------------------
networks:
  cableway-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24

# ------------------------------
# 敏感信息
# ------------------------------
secrets:
  grafana-admin:
    file: ./deploy/secrets/grafana-admin-password.txt
