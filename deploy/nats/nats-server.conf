# NATS Server Config
# 山地索道边缘部署 - 传感器/模块间消息总线

listen: 0.0.0.0:4222
http: 0.0.0.0:8222

server_name: cableway-edge-server

# 认证 - 边缘服务器内网简单认证 (生产环境建议启用 NKEY)
authorization: {
  user: cableway
  password: "change_me_in_production_edge_2026"
  timeout: 3
}

# JetStream 持久化
jetstream: {
  store_dir: "/data/jetstream"
  max_mem: 1GB
  max_file: 30GB
}

# 传感器主题分层
#   sensor.vibration.*    - 高频振动
#   sensor.wind.*         - 风速气象
#   sensor.ice.*          - 覆冰监测
#   sensor.strain.*       - 应变载荷
#   risk.assessment.*     - 风险评估
#   risk.event.*          - 风险事件
#   decision.*            - 决策事件
#   video.*               - 视频联动
#   broadcast.websocket   - WebSocket 扇出广播

# 流定义 - 持久化传感器数据
jetstream {
  streams: [
    {
      name: SENSOR_VIBRATION
      subjects: [ "sensor.vibration.>" ]
      storage: file
      retention: limits
      max_age: 1h
      max_bytes: 5GB
    },
    {
      name: SENSOR_TELEMETRY
      subjects: [ "sensor.wind.>", "sensor.ice.>", "sensor.strain.>", "sensor.weather.>" ]
      storage: file
      retention: limits
      max_age: 24h
      max_bytes: 20GB
    },
    {
      name: RISK
      subjects: [ "risk.assessment.>", "risk.event.>", "risk.alert.>" ]
      storage: file
      retention: limits
      max_age: 168h
      max_bytes: 10GB
    },
    {
      name: DECISION
      subjects: [ "decision.>" ]
      storage: file
      retention: workqueue
      max_consumers: 10
    }
  ]

  consumers: [
    {
      stream_name: SENSOR_TELEMETRY
      durable_name: risk_engine
      deliver_policy: new
      filter_subject: "sensor.*.*"
      ack_wait: 10s
      max_delivery: 5
    },
    {
      stream_name: RISK
      durable_name: decision_engine
      deliver_policy: new
      filter_subject: "risk.event.>"
      ack_wait: 30s
      max_delivery: 3
    }
  ]
}

# 连接上限
max_connections: 512
max_pending: 128MB

# 日志
logtime: true
debug: false
trace: false
log_file: "/data/jetstream/nats.log"
log_size_limit: 100MB
